<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do AuAu | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs-list { display: flex; gap: 10px; margin-bottom: 20px; background: var(--bg-dark); padding: 5px; border-radius: 12px; }
        .tabs-trigger { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 0.8rem; }
        .tabs-trigger.active { background: white; color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 8px; background: var(--bg-dark); border: 1px solid var(--border); color: white; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .photo-placeholder { width: 100px; height: 100px; border-radius: 50%; background: var(--bg-dark); border: 2px dashed var(--border); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .photo-placeholder img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside>
            <div class="logo">
                <span>🐾</span> Cantinho do AuAu
            </div>
            <nav>
                <ul>
                    <li class="active" onclick="showSection('clients')"><span>👥</span> Clientes & Pets</li>
                    <li onclick="showSection('hotel')"><span>🏨</span> Hotel (Monitor)</li>
                    <li onclick="showSection('vaccines')"><span>💉</span> Controle Sanitário</li>
                    <li onclick="showSection('logs')"><span>📋</span> Auditoria</li>
                </ul>
            </nav>
        </aside>

        <main>
            <header>
                <h1 id="section-title">Clientes & Pets</h1>
                <div class="user-info">
                    <button id="add-client-btn" onclick="openAddModal()" style="padding: 0.75rem 1.5rem; border-radius: 12px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600;">+ Novo Cadastro</button>
                </div>
            </header>

            <div id="stats" class="stats-grid">
                <div class="stat-card">
                    <h3>Total de Pets</h3>
                    <div class="value" id="count-pets">0</div>
                </div>
                <div class="stat-card">
                    <h3>No Hotel Agora</h3>
                    <div class="value" id="count-hotel">0</div>
                </div>
                <div class="stat-card">
                    <h3>Vacinas Pendentes</h3>
                    <div class="value" id="count-pending" style="color: var(--danger)">0</div>
                </div>
            </div>

            <section id="content" class="content-card animate-fade">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <input type="text" id="search" placeholder="🔍 Buscar pet ou tutor..." style="padding: 0.75rem; border-radius: 12px; background: var(--bg-dark); border: 1px solid var(--border); color: white; width: 300px;">
                </div>
                
                <div id="data-container" class="client-list">
                    <div style="color: var(--text-secondary)">Carregando dados...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Novo Cliente -->
    <div id="modal-add" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;">
        <div class="content-card" style="width: 600px; max-height: 95vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Novo Cadastro</h2>
                <button onclick="closeModal('modal-add')" style="background:transparent; border:none; color:white; font-size: 1.5rem; cursor:pointer;">&times;</button>
            </div>

            <div class="tabs-list">
                <button class="tabs-trigger active" onclick="switchTab(this, 'tab-pet')">PET</button>
                <button class="tabs-trigger" onclick="switchTab(this, 'tab-tutor')">TUTOR</button>
                <button class="tabs-trigger" onclick="switchTab(this, 'tab-health')">SAÚDE</button>
            </div>

            <form id="client-form" onsubmit="handleFormSubmit(event)">
                <!-- Tab PET -->
                <div id="tab-pet" class="tab-content active">
                    <div class="photo-placeholder" onclick="document.getElementById('photo-input').click()">
                        <span id="photo-label">📸</span>
                        <img id="photo-preview" style="display:none">
                        <input type="file" id="photo-input" hidden onchange="previewPhoto(this)">
                    </div>
                    <div class="form-group">
                        <label>Nome do Dog *</label>
                        <input type="text" id="f-name" required placeholder="Ex: Thor, Luna...">
                    </div>
                    <div class="form-group">
                        <label>Raça</label>
                        <input type="text" id="f-breed" placeholder="Ex: Golden, SRD...">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Porte</label>
                            <select id="f-size">
                                <option value="Pequeno">Pequeno</option>
                                <option value="Médio">Médio</option>
                                <option value="Grande">Grande</option>
                                <option value="Gigante">Gigante</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Gênero</label>
                            <select id="f-gender">
                                <option value="Macho">♂ Macho</option>
                                <option value="Fêmea">♀ Fêmea</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Peso (kg)</label>
                            <input type="number" step="0.1" id="f-weight">
                        </div>
                        <div class="form-group">
                            <label>Nascimento</label>
                            <input type="date" id="f-birth">
                        </div>
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="f-castrated" style="width: auto;">
                        <label for="f-castrated" style="margin: 0;">Castrado(a)?</label>
                    </div>
                </div>

                <!-- Tab TUTOR -->
                <div id="tab-tutor" class="tab-content">
                    <div class="form-group">
                        <label>Nome do Tutor</label>
                        <input type="text" id="f-tutor-name" placeholder="Nome completo">
                    </div>
                    <div class="form-group">
                        <label>CPF</label>
                        <input type="text" id="f-tutor-cpf" placeholder="000.000.000-00">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="text" id="f-tutor-phone" placeholder="(11) 99999-9999">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="f-tutor-email" placeholder="email@exemplo.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Endereço</label>
                        <input type="text" id="f-tutor-address" placeholder="Rua, número, complemento">
                    </div>
                    <div class="form-group">
                        <label>Bairro</label>
                        <input type="text" id="f-tutor-neighborhood" placeholder="Bairro">
                    </div>
                </div>

                <!-- Tab SAÚDE -->
                <div id="tab-health" class="tab-content">
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 15px;">Datas das últimas aplicações:</p>
                    <div class="form-row">
                        <div class="form-group"><label>V10</label><input type="date" id="f-v10"></div>
                        <div class="form-group"><label>Gripe</label><input type="date" id="f-gripe"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Raiva</label><input type="date" id="f-raiva"></div>
                        <div class="form-group"><label>Giardia</label><input type="date" id="f-giardia"></div>
                    </div>
                    <div class="form-group">
                        <label>Antipulgas</label>
                        <input type="date" id="f-antipulgas">
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="closeModal('modal-add')" style="flex: 1; padding: 12px; border-radius: 12px; background: transparent; border: 1px solid var(--border); color: white; cursor: pointer;">Cancelar</button>
                    <button type="submit" style="flex: 1; padding: 12px; border-radius: 12px; background: var(--primary); border: none; color: white; cursor: pointer; font-weight: 700;">SALVAR CADASTRO</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Detalhes (Existente) -->
    <div id="modal-view" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;">
        <div class="content-card" style="width: 500px;">
            <h2 id="view-title">Detalhes</h2>
            <div id="view-body" style="margin-top: 1.5rem;"></div>
            <button onclick="closeModal('modal-view')" style="margin-top: 2rem; width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--bg-dark); color: white; cursor: pointer;">Fechar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
